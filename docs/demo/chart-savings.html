<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Token savings by category</title>
<style>
  :root{ --ink:#1f1d1a; --muted:#6b6760; --line:#e6e3da; --coral:#d97757; --bg:#ffffff;
         --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif; }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink)}
  .card{width:1000px;padding:26px 28px 18px}
  h1{font-size:19px;font-weight:700;margin-bottom:2px}
  .sub{font-size:13px;color:var(--muted);margin-bottom:14px}
  svg{display:block;width:100%;height:auto}
  .cat{font-size:13px;fill:var(--ink);font-weight:600}
  .val{font-size:14px;font-weight:800;fill:var(--coral)}
  .grid{stroke:var(--line);stroke-width:1}
  .axis{font-size:11px;fill:var(--muted)}
  .foot{font-size:11.5px;color:var(--muted);margin-top:10px;text-align:right}
</style>
</head>
<body>
  <div class="card" id="card">
    <h1>Token savings by category — 100 inbox questions</h1>
    <div class="sub">× fewer tokens to answer, mail-index vs a stock Gmail-API MCP &nbsp;·&nbsp; higher is better</div>
    <svg id="chart" viewBox="0 0 944 360" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="foot">Measured on a real 6-month mailbox · <b>15.3×</b> overall · reproduce: <code>node bench/run.mjs --suite inbox100</code></div>
  </div>
<script>
  const data = [
    ["Retrieval",3.0],["Logistics",4.9],["Scheduling",9.2],["Commitments",9.6],
    ["Finance",13.0],["Account",20.3],["Relationship",24.7],["Summarize",32.8],
  ];
  const W=944,H=360, padL=8,padR=8,padT=26,padB=42;
  const plotW=W-padL-padR, plotH=H-padT-padB, max=35;
  const n=data.length, slot=plotW/n, bw=Math.min(74, slot*0.62);
  const y0=padT+plotH;
  const svg=document.getElementById('chart');
  let s='';
  // gridlines
  for(let g=0; g<=35; g+=5){
    const y=y0 - (g/max)*plotH;
    s+=`<line class="grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/>`;
    s+=`<text class="axis" x="${padL+2}" y="${(y-3).toFixed(1)}">${g}×</text>`;
  }
  // bars + labels
  data.forEach(([cat,v],i)=>{
    const cx=padL + slot*i + slot/2;
    const h=(v/max)*plotH, x=cx-bw/2, y=y0-h;
    // gradient by magnitude: lighter -> coral
    const t=v/max; const r=Math.round(233-(233-217)*t), gg=Math.round(214-(214-119)*t), b=Math.round(196-(196-87)*t);
    s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="5" fill="rgb(${r},${gg},${b})"/>`;
    s+=`<text class="val" x="${cx.toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle">${v.toFixed(1)}×</text>`;
    s+=`<text class="cat" x="${cx.toFixed(1)}" y="${(y0+18).toFixed(1)}" text-anchor="middle">${cat}</text>`;
  });
  svg.innerHTML=s;
</script>
</body>
</html>
