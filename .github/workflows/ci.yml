name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (supply-chain hardening) — a moved
      # tag can't change what runs. Comments record the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (frozen lockfile, no scripts)
        # --frozen-lockfile: exact lockfile, no drift. --ignore-scripts: refuse
        # to run any dependency lifecycle script (postinstall) — a common
        # supply-chain vector. mail-index needs none.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      - name: Test (incl. the egress guard — no network in src/)
        run: pnpm test

      - name: Lint
        run: pnpm run lint

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
